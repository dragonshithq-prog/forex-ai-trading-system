# =============================================================================
# Forex AI Trading Platform — Nginx Production Configuration
# =============================================================================
# Features:
#   - HTTP → HTTPS redirect
#   - SSL/TLS termination (TLS 1.2 / 1.3)
#   - Rate limiting (per-IP, per-endpoint)
#   - WebSocket proxying with upgrade support
#   - Gzip compression
#   - Security headers (HSTS, CSP, X-Frame-Options, etc.)
#   - Upstream health checks
#   - API proxy to FastAPI backend
#   - Frontend proxy to Next.js
# =============================================================================

# ── Worker Processes ──────────────────────────────────────────────────────────
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    # ── MIME Types ────────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging Format ────────────────────────────────────────────────────────
    log_format main_json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_addr":"$upstream_addr",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"request_id":"$request_id"'
    '}';

    access_log /var/log/nginx/access.log main_json;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75;
    keepalive_requests  1000;
    types_hash_max_size 2048;
    server_tokens       off;                # Do not leak nginx version

    # ── Buffer Sizes ──────────────────────────────────────────────────────────
    client_body_buffer_size       128k;
    client_max_body_size          50m;      # Allow file uploads up to 50MB
    client_header_buffer_size     1k;
    large_client_header_buffers   4 8k;
    output_buffers                2 64k;

    # ── Timeouts ──────────────────────────────────────────────────────────────
    client_body_timeout      60s;
    client_header_timeout    60s;
    send_timeout             60s;
    proxy_connect_timeout    60s;
    proxy_send_timeout       120s;
    proxy_read_timeout       120s;

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # ── Rate Limiting Zones ───────────────────────────────────────────────────
    # General API rate limit: 100 req/min per IP
    limit_req_zone  $binary_remote_addr zone=api_limit:10m    rate=100r/m;
    # Strict limit for auth endpoints: 10 req/min per IP
    limit_req_zone  $binary_remote_addr zone=auth_limit:5m    rate=10r/m;
    # WebSocket connections: 20 concurrent per IP
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    # Return 429 on rate limit (not 503)
    limit_req_status  429;
    limit_conn_status 429;

    # ── Upstream: FastAPI Backend ─────────────────────────────────────────────
    upstream backend {
        least_conn;
        server backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;                       # Keep connections alive to backend
    }

    # ── Upstream: Next.js Frontend ────────────────────────────────────────────
    upstream frontend {
        least_conn;
        server frontend:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ── Shared Proxy Headers ──────────────────────────────────────────────────
    proxy_http_version  1.1;
    proxy_set_header    Host               $host;
    proxy_set_header    X-Real-IP          $remote_addr;
    proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto  $scheme;
    proxy_set_header    X-Request-ID       $request_id;
    proxy_hide_header   X-Powered-By;

    # ── Security Headers Map ──────────────────────────────────────────────────
    map $sent_http_content_type $csp_header {
        "~text/html"  "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self';";
        default       "";
    }

    # ── Server Block: HTTP → HTTPS Redirect ──────────────────────────────────
    server {
        listen      80;
        listen      [::]:80;
        server_name _;

        # Let's Encrypt ACME challenge (certbot webroot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check endpoint (for load balancer, no redirect)
        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Redirect all other HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Server Block: HTTPS Main ──────────────────────────────────────────────
    server {
        listen      443 ssl http2;
        listen      [::]:443 ssl http2;
        server_name yourdomain.com api.yourdomain.com;   # Replace with your domain

        # ── SSL Configuration ──────────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Strong TLS settings (Mozilla Intermediate compatibility)
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout       1d;
        ssl_session_cache         shared:MozSSL:10m;
        ssl_session_tickets       off;
        ssl_stapling              on;
        ssl_stapling_verify       on;
        resolver                  1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout          5s;

        # ── Security Headers ───────────────────────────────────────────────
        add_header Strict-Transport-Security     "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options               "DENY"                                         always;
        add_header X-Content-Type-Options        "nosniff"                                      always;
        add_header X-XSS-Protection              "1; mode=block"                                always;
        add_header Referrer-Policy               "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy            "camera=(), microphone=(), geolocation=()"     always;
        add_header Content-Security-Policy       $csp_header                                    always;
        add_header X-Request-ID                  $request_id                                    always;

        # ── Health Check (internal, no logging) ───────────────────────────
        location = /health {
            access_log  off;
            return 200  "healthy\n";
            add_header  Content-Type text/plain;
        }

        # ── Authentication Endpoints (stricter rate limit) ────────────────
        location ~* ^/api/v1/(auth|login|token) {
            limit_req  zone=auth_limit burst=5 nodelay;
            limit_req_log_level warn;

            proxy_pass http://backend;
            include    /etc/nginx/proxy_params;
        }

        # ── API Proxy → FastAPI Backend ───────────────────────────────────
        location /api/v1/ {
            limit_req  zone=api_limit burst=50 nodelay;
            limit_req_log_level warn;

            proxy_pass         http://backend;
            proxy_set_header   Connection "";         # Enable HTTP/1.1 keepalive
            proxy_buffering    on;
            proxy_buffer_size  128k;
            proxy_buffers      4 256k;
        }

        # ── WebSocket Proxy → Backend (/ws) ───────────────────────────────
        location /ws {
            limit_conn ws_conn 20;

            proxy_pass          http://backend;

            # Critical WebSocket upgrade headers
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_set_header    X-Real-IP  $remote_addr;

            # Long timeouts for persistent WebSocket connections
            proxy_read_timeout  3600s;     # 1 hour
            proxy_send_timeout  3600s;
            proxy_connect_timeout 10s;

            # Disable buffering for WebSocket
            proxy_buffering     off;
            proxy_cache         off;
        }

        # ── Metrics Endpoint (internal IP only) ───────────────────────────
        location /metrics {
            allow 172.20.0.0/24;            # Internal Docker network
            allow 127.0.0.1;
            deny  all;

            proxy_pass http://backend;
        }

        # ── Static Assets (Next.js _next/static) ─────────────────────────
        location /_next/static/ {
            proxy_pass          http://frontend;
            proxy_cache_valid   200 365d;
            add_header          Cache-Control "public, max-age=31536000, immutable";
            access_log          off;
        }

        # ── Frontend Proxy → Next.js ──────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Connection "";

            # Cache HTML pages briefly
            proxy_cache_valid   200 1m;
            add_header          Cache-Control "no-cache";
        }

        # ── 404/50x Error Pages ───────────────────────────────────────────
        error_page 404              /404;
        error_page 429              @rate_limited;
        error_page 500 502 503 504  @backend_error;

        location @rate_limited {
            return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please slow down."}';
            add_header Content-Type application/json always;
        }

        location @backend_error {
            return 503 '{"error":"Service Unavailable","message":"The service is temporarily unavailable. Please try again shortly."}';
            add_header Content-Type application/json always;
        }
    }
}
