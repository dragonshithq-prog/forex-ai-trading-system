services:
  - type: web
    name: forex-trading-backend
    runtime: python
    repo: https://github.com/dragonshithq-prog/forex-ai-trading-system
    region: oregon
    plan: free
    branch: master
    rootDir: backend
    buildCommand: pip install -r <(uv pip compile pyproject.toml --generate-hashes 2>/dev/null || pip install .)
    startCommand: uvicorn forex_trading.main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: WORKERS
        value: 2
      - key: CORS_ORIGINS
        value: https://frontend-nin7j9z9a-crystalmania.vercel.app
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: POSTGRES_DB
        fromDatabase:
          name: forex-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: forex-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: forex-db
          property: password
      - key: DATABASE_URL
        fromDatabase:
          name: forex-db
          property: connectionString
      - key: REDIS_URL
        value: ""

databases:
  - name: forex-db
    plan: free
    region: oregon
    databaseName: forex_trading
    user: forex
    ipAllowList: []
