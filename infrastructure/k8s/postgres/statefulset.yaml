# =============================================================================
# PostgreSQL StatefulSet with TimescaleDB — Forex AI Trading Platform
# Persistent storage: 20Gi per replica
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: forex-trading
  labels:
    app: postgres
    tier: database
spec:
  serviceName: postgres-headless
  replicas: 1                         # Scale to 2+ with read replicas if needed
  selector:
    matchLabels:
      app: postgres

  updateStrategy:
    type: RollingUpdate

  template:
    metadata:
      labels:
        app: postgres
        tier: database
    spec:

      securityContext:
        runAsUser:    999               # postgres uid in official image
        runAsGroup:   999
        fsGroup:      999
        seccompProfile:
          type: RuntimeDefault

      serviceAccountName: postgres-sa
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 120

      containers:
        - name: postgres
          image: timescale/timescaledb:latest-pg16
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add:  ["CHOWN", "FOWNER", "DAC_OVERRIDE", "SETUID", "SETGID"]

          resources:
            requests:
              cpu:    "500m"
              memory: "1Gi"
            limits:
              cpu:    "2000m"
              memory: "4Gi"

          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key:  POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key:  POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key:  POSTGRES_PASSWORD
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
            - name: POSTGRES_INITDB_ARGS
              value: "--encoding=UTF8 --locale=en_US.UTF-8"
            # TimescaleDB tuning
            - name: TIMESCALEDB_TELEMETRY
              value: "off"

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
            initialDelaySeconds: 30
            periodSeconds:       20
            timeoutSeconds:      5
            failureThreshold:    3

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
            initialDelaySeconds: 10
            periodSeconds:       5
            timeoutSeconds:      3
            failureThreshold:    5

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-config
              mountPath: /etc/postgresql/postgresql.conf
              subPath:   postgresql.conf

      volumes:
        - name: postgres-config
          configMap:
            name: postgres-config

  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app: postgres
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3               # AWS EBS gp3 — adjust per cloud
        resources:
          requests:
            storage: 20Gi

---
# ── Headless Service (for StatefulSet DNS) ────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: forex-trading
  labels:
    app: postgres
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432

---
# ── ClusterIP Service (for application access) ────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: forex-trading
  labels:
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name:       postgres
      port:       5432
      targetPort: postgres

---
# ── PostgreSQL Tuning Configuration ───────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: forex-trading
data:
  postgresql.conf: |
    # Memory
    shared_buffers        = 1GB
    effective_cache_size  = 3GB
    work_mem              = 64MB
    maintenance_work_mem  = 256MB
    # Connections
    max_connections       = 200
    # WAL
    wal_level             = replica
    max_wal_size          = 2GB
    min_wal_size          = 1GB
    # Checkpoints
    checkpoint_completion_target = 0.9
    # Logging
    log_timezone          = UTC
    timezone              = UTC
    # TimescaleDB
    shared_preload_libraries = 'timescaledb'
    timescaledb.max_background_workers = 8

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-sa
  namespace: forex-trading
