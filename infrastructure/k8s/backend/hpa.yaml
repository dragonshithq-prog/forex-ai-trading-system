# =============================================================================
# HorizontalPodAutoscaler — Backend
# Scales on CPU > 70% OR Memory > 80%
# Min replicas: 2 | Max replicas: 10
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: forex-trading
  labels:
    app: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend

  minReplicas: 2
  maxReplicas: 10

  metrics:
    # Scale on CPU utilization > 70%
    - type: Resource
      resource:
        name: cpu
        target:
          type:               AverageUtilization
          averageUtilization: 70

    # Scale on Memory utilization > 80%
    - type: Resource
      resource:
        name: memory
        target:
          type:               AverageUtilization
          averageUtilization: 80

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60       # Wait 60s before scaling up again
      policies:
        - type:          Pods
          value:         2                 # Add max 2 pods at a time
          periodSeconds: 60
      selectPolicy: Max

    scaleDown:
      stabilizationWindowSeconds: 300      # Wait 5 min before scaling down
      policies:
        - type:          Pods
          value:         1                 # Remove max 1 pod at a time
          periodSeconds: 120
      selectPolicy: Min
