# =============================================================================
# Backend Secrets Template — Forex AI Trading Platform
# =============================================================================
# Instructions:
#   1. Replace all placeholder values (base64-encoded)
#   2. Apply: kubectl apply -f infrastructure/k8s/backend/secrets.yaml
#   3. NEVER commit the decoded values to version control
#
# Encode values:
#   echo -n "your-value" | base64 -w0
#
# For production, use external secrets operator (e.g., AWS Secrets Manager
# via the Secrets Store CSI driver) instead of static Kubernetes Secrets.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: forex-trading
  labels:
    app: backend
    tier: api
type: Opaque
data:
  # ── Application Secrets ──────────────────────────────────────────────────
  # Generate: openssl rand -hex 64 | base64 -w0
  SECRET_KEY: "Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tYW5kLXVzZS1hLXNlY3VyZS1zZWNyZXQ="

  # ── JWT Secrets ─────────────────────────────────────────────────────────
  # Generate: openssl rand -hex 64 | base64 -w0
  JWT_SECRET_KEY: "eW91ci1qd3Qtc2VjcmV0LWNoYW5nZS1pbi1wcm9kdWN0aW9u"

  # ── Database ─────────────────────────────────────────────────────────────
  # Password for PostgreSQL user (set in postgres-secrets as well)
  POSTGRES_PASSWORD: "Y2hhbmdlbWVfZGJfcGFzc3dvcmQ="

  # ── Redis ────────────────────────────────────────────────────────────────
  REDIS_PASSWORD: "Y2hhbmdlbWVfcmVkaXNfcGFzc3dvcmQ="

  # ── Broker API Keys ──────────────────────────────────────────────────────
  OANDA_API_KEY: ""
  OANDA_ACCOUNT_ID: ""

  # ── External Services ────────────────────────────────────────────────────
  SENTRY_DSN: ""

---
# ── Postgres Secrets ──────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: forex-trading
  labels:
    app: postgres
    tier: database
type: Opaque
data:
  POSTGRES_DB: "Zm9yZXhfdHJhZGluZw=="          # forex_trading
  POSTGRES_USER: "Zm9yZXg="                      # forex
  POSTGRES_PASSWORD: "Y2hhbmdlbWVfZGJfcGFzc3dvcmQ="  # changeme_db_password

---
# ── Redis Secrets ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  namespace: forex-trading
  labels:
    app: redis
    tier: cache
type: Opaque
data:
  REDIS_PASSWORD: "Y2hhbmdlbWVfcmVkaXNfcGFzc3dvcmQ="  # changeme_redis_password

---
# ── Grafana Secrets ───────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secrets
  namespace: forex-trading
  labels:
    app: grafana
    tier: monitoring
type: Opaque
data:
  GF_SECURITY_ADMIN_USER: "YWRtaW4="              # admin
  GF_SECURITY_ADMIN_PASSWORD: "Y2hhbmdlbWVfZ3JhZmFuYV9wYXNz"  # changeme_grafana_pass
  GF_SECURITY_SECRET_KEY: "Y2hhbmdlbWVfZ3JhZmFuYV9zZWNyZXQ="  # changeme_grafana_secret

---
# ── Kafka Secrets ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: kafka-secrets
  namespace: forex-trading
  labels:
    app: kafka
    tier: streaming
type: Opaque
data:
  KAFKA_CLUSTER_ID: "TWs2MEYrVmxUV3lUUFg3eFJYdDdFZz09"  # Pre-generated UUID
