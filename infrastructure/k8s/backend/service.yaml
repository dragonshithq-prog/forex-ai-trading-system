apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: forex-trading
  labels:
    app: backend
    tier: api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port:   "8000"
    prometheus.io/path:   "/metrics"
spec:
  type: ClusterIP
  selector:
    app: backend
    tier: api
  ports:
    - name:       http
      protocol:   TCP
      port:       8000
      targetPort: http
  sessionAffinity: None
