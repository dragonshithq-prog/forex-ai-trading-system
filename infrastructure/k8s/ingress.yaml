# =============================================================================
# Ingress — Forex AI Trading Platform
# Uses nginx-ingress-controller with TLS termination via cert-manager
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forex-trading-ingress
  namespace: forex-trading
  labels:
    app: forex-trading
  annotations:
    # Ingress class
    kubernetes.io/ingress.class: "nginx"
    # TLS via cert-manager (Let's Encrypt)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Rate limiting (100 req/min per IP)
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    # Proxy buffer settings
    nginx.ingress.kubernetes.io/proxy-buffer-size:  "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      more_clear_headers Server;
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin:  "https://yourdomain.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, X-Request-ID"
    # Gzip
    nginx.ingress.kubernetes.io/enable-gzip: "true"
    # Rewrite
    nginx.ingress.kubernetes.io/use-regex: "true"

spec:
  ingressClassName: nginx

  tls:
    - hosts:
        - yourdomain.com
        - api.yourdomain.com
      secretName: forex-trading-tls

  rules:
    # ── API — route to backend ─────────────────────────────────────────────
    - host: api.yourdomain.com
      http:
        paths:
          - path: /api/v1/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          # WebSocket route
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          # Health check
          - path: /health
            pathType: Exact
            backend:
              service:
                name: backend-service
                port:
                  number: 8000

    # ── Frontend — route to Next.js ────────────────────────────────────────
    - host: yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000

---
# ── WebSocket-specific Ingress (needs separate annotations for upgrade) ────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forex-trading-ws-ingress
  namespace: forex-trading
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-read-timeout:  "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout:  "3600"
    nginx.ingress.kubernetes.io/connection-proxy-header: "upgrade"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.yourdomain.com
      secretName: forex-trading-tls
  rules:
    - host: api.yourdomain.com
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
