# =============================================================================
# Frontend Deployment — Forex AI Trading Platform
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: forex-trading
  labels:
    app: frontend
    tier: web
spec:
  replicas: 2
  revisionHistoryLimit: 5

  selector:
    matchLabels:
      app: frontend
      tier: web

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: frontend
        tier: web
    spec:

      securityContext:
        runAsNonRoot: true
        runAsUser:    1001
        runAsGroup:   1001
        fsGroup:      1001
        seccompProfile:
          type: RuntimeDefault

      serviceAccountName: frontend-sa
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30

      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - frontend
              topologyKey: "kubernetes.io/hostname"

      containers:
        - name: frontend
          image: REGISTRY_PLACEHOLDER/frontend:IMAGE_TAG_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          resources:
            requests:
              cpu:    "100m"
              memory: "256Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"

          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: PORT
              value: "3000"
          envFrom:
            - configMapRef:
                name: frontend-config

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds:       15
            timeoutSeconds:      10
            failureThreshold:    3

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds:       5
            timeoutSeconds:      5
            failureThreshold:    3

          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 20
            periodSeconds:    5

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /app/.next/cache

      volumes:
        - name: tmp
          emptyDir: {}
        - name: next-cache
          emptyDir: {}

      imagePullSecrets:
        - name: ecr-registry-secret

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: forex-trading
data:
  NEXT_PUBLIC_API_URL: "https://api.yourdomain.com"
  NEXT_PUBLIC_WS_URL:  "wss://api.yourdomain.com/ws"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: forex-trading
  labels:
    app: frontend
