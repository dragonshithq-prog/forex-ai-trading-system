apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: forex-trading
  labels:
    app: frontend
    tier: web
spec:
  type: ClusterIP
  selector:
    app: frontend
    tier: web
  ports:
    - name:       http
      protocol:   TCP
      port:       3000
      targetPort: http
  sessionAffinity: None
