global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

  external_labels:
    environment: production
    platform:    forex-trading

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: forex-backend
    scrape_interval: 15s
    scrape_timeout:  10s
    metrics_path:    /metrics
    scheme:          http
    static_configs:
      - targets:
          - 'backend:8000'
        labels:
          service: backend
          tier:    api

  - job_name: forex-frontend
    scrape_interval: 30s
    metrics_path:    /api/metrics
    static_configs:
      - targets:
          - 'frontend:3000'
        labels:
          service: frontend
          tier:    web

  - job_name: grafana
    scrape_interval: 60s
    static_configs:
      - targets:
          - 'grafana:3000'
        labels:
          service: grafana
