apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus-forex
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    version: 1
    jsonData:
      httpMethod:        POST
      timeInterval:      "15s"
      queryTimeout:      "60s"
      scrapeInterval:    "15s"
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo

  - name: Loki
    type: loki
    uid: loki-forex
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    version: 1
    jsonData:
      maxLines: 1000

  - name: Alertmanager
    type: alertmanager
    uid: alertmanager-forex
    access: proxy
    url: http://alertmanager:9093
    isDefault: false
    editable: false
    version: 1
    jsonData:
      implementation: prometheus
