apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus-forex
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    version: 1
    jsonData:
      httpMethod:        POST
      timeInterval:      "15s"
      queryTimeout:      "60s"
      scrapeInterval:    "15s"
