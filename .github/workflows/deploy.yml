# =============================================================================
# Deploy Pipeline — Forex AI Trading Platform
# Triggers: push to main (→ staging) | tagged release (→ production)
# =============================================================================
# This workflow handles deployment to staging and production environments.
# It builds and pushes Docker images, applies Kubernetes manifests, and
# runs smoke tests. Supports rollback on failure and manual approval gates.
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"    # Semantic version tags: v1.2.3
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options: [staging, production]
      image_tag:
        description: "Image tag to deploy (default: sha-<commit>)"
        required: false
        default: ""

env:
  AWS_REGION:      us-east-1
  EKS_CLUSTER:     forex-trading-production-eks
  EKS_NAMESPACE:   forex-trading
  REGISTRY:        ghcr.io
  IMAGE_NAME:      ${{ github.repository }}

jobs:
  # ── Job: Resolve image tag and target environment ─────────────────────────
  resolve:
    name: Resolve deployment params
    runs-on: ubuntu-latest
    outputs:
      image-tag:   ${{ steps.tag.outputs.tag }}
      environment: ${{ steps.env.outputs.environment }}

    steps:
      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-$(echo ${{ github.sha }} | head -c 7)" >> $GITHUB_OUTPUT
          fi

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

  # ── Job: Build & Push Docker Images ──────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [resolve]
    # Only build from scratch on tag pushes (CI builds on branch pushes)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: GithubActions-Deploy-Build-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend to ECR
        uses: docker/build-push-action@v6
        with:
          context:    .
          file:       docker/Dockerfile.backend
          push:       true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/forex-trading-production/backend:${{ needs.resolve.outputs.image-tag }}
            ${{ steps.ecr-login.outputs.registry }}/forex-trading-production/backend:latest
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,mode=max,scope=backend
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

      - name: Build & push frontend to ECR
        uses: docker/build-push-action@v6
        with:
          context:    .
          file:       docker/Dockerfile.frontend
          push:       true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/forex-trading-production/frontend:${{ needs.resolve.outputs.image-tag }}
            ${{ steps.ecr-login.outputs.registry }}/forex-trading-production/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,mode=max,scope=frontend
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}
            NEXT_PUBLIC_API_URL=https://api.yourdomain.com

      - name: Trivy scan — backend image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.ecr-login.outputs.registry }}/forex-trading-production/backend:${{ needs.resolve.outputs.image-tag }}
          format:    table
          exit-code: "1"
          severity:  CRITICAL,HIGH
          ignore-unfixed: true

      - name: Trivy scan — frontend image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.ecr-login.outputs.registry }}/forex-trading-production/frontend:${{ needs.resolve.outputs.image-tag }}
          format:    table
          exit-code: "1"
          severity:  CRITICAL,HIGH
          ignore-unfixed: true

  # ── Job: Deploy to Staging ───────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: [resolve]
    if: |
      needs.resolve.outputs.environment == 'staging' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment:
      name: staging
      url: https://staging.yourdomain.com
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: GithubActions-Staging-${{ github.run_id }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name forex-trading-staging-eks \
            --region ${{ env.AWS_REGION }}

      - name: Validate Kubernetes manifests
        run: |
          kubectl apply \
            -f infrastructure/k8s/ \
            --dry-run=server \
            --recursive 2>&1

      - name: Deploy backend to staging
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ needs.resolve.outputs.image-tag }}"
          kubectl set image deployment/backend \
            backend="${IMAGE}" \
            -n ${{ env.EKS_NAMESPACE }}-staging

      - name: Deploy frontend to staging
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ needs.resolve.outputs.image-tag }}"
          kubectl set image deployment/frontend \
            frontend="${IMAGE}" \
            -n ${{ env.EKS_NAMESPACE }}-staging

      - name: Wait for backend rollout
        run: |
          kubectl rollout status deployment/backend \
            -n ${{ env.EKS_NAMESPACE }}-staging \
            --timeout=300s

      - name: Wait for frontend rollout
        run: |
          kubectl rollout status deployment/frontend \
            -n ${{ env.EKS_NAMESPACE }}-staging \
            --timeout=300s

      - name: Run smoke tests (staging)
        run: |
          set -euo pipefail

          STAGING_URL="https://staging-api.yourdomain.com"
          echo "Running smoke tests against: $STAGING_URL"

          # Health check
          curl -sf "${STAGING_URL}/health" | jq .

          # API availability
          curl -sf "${STAGING_URL}/api/v1/docs" -o /dev/null

          # Check response time < 2s
          RESPONSE_TIME=$(curl -o /dev/null -s -w "%{time_total}" "${STAGING_URL}/health")
          echo "Response time: ${RESPONSE_TIME}s"
          python3 -c "import sys; rt=float('${RESPONSE_TIME}'); sys.exit(0 if rt < 2.0 else 1)"

          echo "✅ All smoke tests passed"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Deployment failed — rolling back staging..."
          kubectl rollout undo deployment/backend  -n ${{ env.EKS_NAMESPACE }}-staging
          kubectl rollout undo deployment/frontend -n ${{ env.EKS_NAMESPACE }}-staging
          kubectl rollout status deployment/backend  -n ${{ env.EKS_NAMESPACE }}-staging --timeout=120s
          kubectl rollout status deployment/frontend -n ${{ env.EKS_NAMESPACE }}-staging --timeout=120s

  # ── Job: Deploy to Production ─────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [resolve, deploy-staging]
    if: |
      needs.resolve.outputs.environment == 'production' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    environment:
      name: production              # Requires manual approval in GitHub environment settings
      url: https://yourdomain.com
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: GithubActions-Production-${{ github.run_id }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Validate deployment manifests (dry-run)
        run: |
          kubectl apply \
            -f infrastructure/k8s/ \
            --namespace ${{ env.EKS_NAMESPACE }} \
            --dry-run=server \
            --recursive

      - name: Apply Kubernetes manifests (non-deployment resources)
        run: |
          # Apply config, services, and HPA (but not deployments yet)
          kubectl apply -f infrastructure/k8s/backend/service.yaml  -n ${{ env.EKS_NAMESPACE }}
          kubectl apply -f infrastructure/k8s/frontend/service.yaml -n ${{ env.EKS_NAMESPACE }}
          kubectl apply -f infrastructure/k8s/backend/hpa.yaml      -n ${{ env.EKS_NAMESPACE }}
          kubectl apply -f infrastructure/k8s/backend/pdb.yaml      -n ${{ env.EKS_NAMESPACE }} || true
          kubectl apply -f infrastructure/k8s/ingress.yaml           -n ${{ env.EKS_NAMESPACE }}

      - name: Deploy backend (rolling update)
        run: |
          IMAGE_BACKEND="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ needs.resolve.outputs.image-tag }}"
          kubectl set image deployment/backend \
            backend="${IMAGE_BACKEND}" \
            -n ${{ env.EKS_NAMESPACE }}
          kubectl annotate deployment/backend \
            kubernetes.io/change-cause="Release ${{ needs.resolve.outputs.image-tag }} by ${{ github.actor }} at $(date -u +%FT%TZ)" \
            --overwrite \
            -n ${{ env.EKS_NAMESPACE }}

      - name: Wait for backend rollout
        run: |
          kubectl rollout status deployment/backend \
            -n ${{ env.EKS_NAMESPACE }} \
            --timeout=600s

      - name: Deploy frontend (rolling update)
        run: |
          IMAGE_FRONTEND="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ needs.resolve.outputs.image-tag }}"
          kubectl set image deployment/frontend \
            frontend="${IMAGE_FRONTEND}" \
            -n ${{ env.EKS_NAMESPACE }}

      - name: Wait for frontend rollout
        run: |
          kubectl rollout status deployment/frontend \
            -n ${{ env.EKS_NAMESPACE }} \
            --timeout=300s

      - name: Run production smoke tests
        run: |
          set -euo pipefail

          API_URL="https://api.yourdomain.com"
          FRONTEND_URL="https://yourdomain.com"

          echo "Testing API: $API_URL"
          curl -sf "${API_URL}/health"     | jq .
          curl -sf "${API_URL}/api/v1/docs" -o /dev/null
          echo "Testing Frontend: $FRONTEND_URL"
          curl -sf "${FRONTEND_URL}" -o /dev/null

          echo "✅ Production smoke tests passed"

      - name: Verify all pods are running
        run: |
          kubectl get pods -n ${{ env.EKS_NAMESPACE }} -o wide
          BACKEND_READY=$(kubectl get deployment backend \
            -n ${{ env.EKS_NAMESPACE }} \
            -o jsonpath='{.status.readyReplicas}')
          echo "Backend ready replicas: $BACKEND_READY"
          [ "$BACKEND_READY" -ge 2 ] || (echo "ERROR: Insufficient ready replicas" && exit 1)

      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Production deployment FAILED — triggering rollback..."
          kubectl rollout undo deployment/backend  -n ${{ env.EKS_NAMESPACE }}
          kubectl rollout undo deployment/frontend -n ${{ env.EKS_NAMESPACE }}

          # Wait for rollback to complete
          kubectl rollout status deployment/backend  -n ${{ env.EKS_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/frontend -n ${{ env.EKS_NAMESPACE }} --timeout=300s

          echo "Rollback complete. Check logs: kubectl logs -l app=backend -n ${{ env.EKS_NAMESPACE }}"

      - name: Create GitHub deployment status
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createDeploymentStatus({
              owner:          context.repo.owner,
              repo:           context.repo.repo,
              deployment_id:  context.payload.deployment?.id || 0,
              state:          status,
              environment_url: 'https://yourdomain.com',
              description:    `Deployment ${{ needs.resolve.outputs.image-tag }} ${status}`,
            });

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ *Production deployment successful*",
              "attachments": [{
                "color": "good",
                "fields": [
                  {"title": "Version",     "value": "${{ needs.resolve.outputs.image-tag }}", "short": true},
                  {"title": "Deployed by", "value": "${{ github.actor }}",                     "short": true},
                  {"title": "Commit",      "value": "${{ github.sha }}",                       "short": false}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚨 *Production deployment FAILED — rollback triggered*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "Version",  "value": "${{ needs.resolve.outputs.image-tag }}", "short": true},
                  {"title": "Actor",    "value": "${{ github.actor }}",                     "short": true},
                  {"title": "Run URL",  "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
